<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tennis Live Monitor - Seamless HQ</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap');

    :root {
      --primary:   #59728E;
      --bg:        #1a1e28;
      --surface:   #262934;
      --border:    #3a4257;
      --text:      #dce6f0;
      --accent:    #a8c4dc;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; height: 100vh; }

    #header {
      height: 70px; background: var(--surface); border-bottom: 2px solid var(--primary);
      display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
      z-index: 10; position: relative;
    }

    .logo-text h1 { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 2px; color: var(--accent); }

    #status-bar { text-align: right; display: flex; align-items: center; gap: 20px; }
    #clock { font-weight: bold; font-size: 1.2rem; }
    #timer-wrap { font-size: 0.7rem; opacity: 0.8; line-height: 1.2; }

    #content-wrap { 
      height: calc(100vh - 70px); width: 100%; 
      display: flex; justify-content: center; 
      background: #ffffff; overflow: hidden; position: relative;
    }

    #pdf-img { 
      height: 100%; width: auto; display: block;
      image-rendering: -webkit-optimize-contrast;
      transition: opacity 0.5s ease-in-out; /* Weicher Übergang */
    }

    /* Initialer Lade-Bildschirm (nur beim ersten Mal) */
    #loading { 
      position: fixed; inset: 0; background: var(--bg); 
      display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; 
    }
    .spinner { width: 50px; height: 50px; border: 5px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { opacity: 0; pointer-events: none; transition: opacity 0.8s; }
  </style>
</head>
<body>

<div id="header">
  <div class="logo-text">
    <h1>Tennis Andorf Live</h1>
    <span id="subtitle" style="font-size: 0.75rem; color: var(--accent); text-transform: uppercase;">Initialisiere...</span>
  </div>
  <div id="status-bar">
    <div id="timer-wrap">Nächster Wechsel<br>in <span id="timer">60</span> Sek.</div>
    <div id="clock">--:--</div>
  </div>
</div>

<div id="content-wrap">
  <img id="pdf-img" src="" alt="Spielbericht">
</div>

<div id="loading">
  <div class="spinner"></div>
  <p style="margin-top:20px;">Lade Live-Daten...</p>
</div>

const RELOAD_EVERY = 60; 
// ═══════════════════════════════════════════════

let timeLeft = RELOAD_EVERY;
let currentIndex = 0;
let isFirstLoad = true;

function refresh() {
  const today = new Date().toISOString().split('T')[0];
  const activeList = PDF_LISTE.filter(p => p.datum === today);

  if (activeList.length === 0) {
    document.getElementById('subtitle').textContent = "Keine Spiele heute (" + today + ")";
    document.getElementById('loading').classList.add('hidden');
    return;
  }

  if (currentIndex >= activeList.length) currentIndex = 0;
  const target = activeList[currentIndex];

  // HQ-URL wie zuvor
  const googleBase = "https://docs.google.com/viewer?url=" + encodeURIComponent(target.url) + "&embedded=true&a=bi&pagenumber=1&w=2400";
  const finalHqUrl = "https://images.weserv.nl/?url=" + encodeURIComponent(googleBase) + "&q=95&sharp=1&nocache=" + Date.now();

  // --- BACKGROUND LOADING LOGIC ---
  const tempImg = new Image(); // Unsichtbares Bild-Objekt im Speicher
  tempImg.src = finalHqUrl;

  tempImg.onload = () => {
    const mainImg = document.getElementById('pdf-img');
    
    // Erst wenn das Bild geladen ist, tauschen wir es aus
    mainImg.src = tempImg.src;

    // UI Updates
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('subtitle').textContent = activeList.length > 1 ? `Bericht ${currentIndex + 1} von ${activeList.length}` : "Live Ergebnisse";
    
    isFirstLoad = false;
  };

  currentIndex++;
  timeLeft = RELOAD_EVERY;
}

// Timer & Uhrzeit
setInterval(() => {
  timeLeft--;
  document.getElementById('timer').textContent = timeLeft;
  if (timeLeft <= 0) refresh();
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('de-AT', {hour:'2-digit', minute:'2-digit'});
}, 1000);

refresh();
