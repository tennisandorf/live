<head>
  <meta charset="UTF-8">

  <title>Tennis Spielstand - TV Mode</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap');
    :root { --primary: #59728E; --bg: #1a1e28; --surface: #262934; --border: #3a4257; --text: #dce6f0; --accent: #a8c4dc; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; height: 100vh; }
    #header { height: 70px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
    .logo-text h1 { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--accent); letter-spacing: 2px; }
    #status { text-align: right; font-size: 0.8rem; }
    #content-wrap { height: calc(100vh - 70px); width: 100%; display: flex; justify-content: center; align-items: flex-start; overflow-y: auto; background: #f0f0f0; }
    
    /* Das Bild des PDFs */
    #pdf-img { max-width: 100%; height: auto; display: block; box-shadow: 0 0 20px rgba(0,0,0,0.5); }

    #loading { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
    .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }
  </style>
</head>

<div id="header">
  <div class="logo-text">
    <h1>Spielstände</h1>
    <span id="subtitle" style="font-size: 0.7rem; color: var(--accent);">Initialisiere...</span>
  </div>
  <div id="status">
    <div id="update-time" style="font-weight: bold;">--:--</div>
    <div>Nächster Wechsel in: <span id="timer">60</span>s</div>
  </div>
</div>

<div id="content-wrap">
  <img id="pdf-img" src="" alt="Spielbericht">
</div>

const WECHSEL_SEK = 60;
// ═══════════════════════════════════════════════

let secondsLeft = WECHSEL_SEK;
let currentIndex = 0;

function refresh() {
  const heute = new Date().toISOString().split('T')[0];
  const heutePDFs = PDF_LISTE.filter(p => p.datum === heute);

  if (heutePDFs.length === 0) {
    document.getElementById('subtitle').textContent = "Keine Spiele für heute (" + heute + ")";
    document.getElementById('loading').classList.add('hidden');
    return;
  }

  document.getElementById('loading').classList.remove('hidden');
  
  if (currentIndex >= heutePDFs.length) currentIndex = 0;
  const target = heutePDFs[currentIndex];

  // TRICK: Wir nutzen den "Cloudflare PDF-to-Img" Service von "ApyHub" oder ähnlichen freien Proxies
  // Für diesen Test nutzen wir den Google-Vorschaubild-Dienst, der oft Bilder liefert:
  const proxyUrl = "https://images.weserv.nl/?url=" + encodeURIComponent(target.url) + "&output=jpg&n=-1";
  
  // Alternative: Da liga.nu PDFs oft blockiert, ist der sicherste Weg für den TV, 
  // das PDF über einen freien Redirector als Bild zu laden:
  const imgElement = document.getElementById('pdf-img');
  
  // Wir versuchen es mit dem Google-Drive-Viewer Export-Link (funktioniert oft als Bild-Proxy)
  const finalImgUrl = "https://docs.google.com/viewer?url=" + encodeURIComponent(target.url) + "&embedded=true&a=bi&pagenumber=1&w=1200";

  imgElement.src = finalImgUrl;

  imgElement.onload = () => {
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('update-time').textContent = new Date().toLocaleTimeString('de-AT');
    document.getElementById('subtitle').textContent = `Bericht ${currentIndex + 1} von ${heutePDFs.length}`;
  };

  imgElement.onerror = () => {
    // Falls der Bild-Dienst blockiert wird:
    document.getElementById('subtitle').textContent = "Fehler beim Laden des Bildes";
    document.getElementById('loading').classList.add('hidden');
  };

  currentIndex++;
  secondsLeft = WECHSEL_SEK;
}

function tick() {
  document.getElementById('timer').textContent = secondsLeft;
  if (secondsLeft <= 0) refresh();
  else secondsLeft--;
}

refresh();
setInterval(tick, 1000);
</script>
