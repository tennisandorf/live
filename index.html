<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TV McDonald's Andorf – Live Ergebnisse</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue:     #59728E;
      --navy:     #262934;
      --blue-lt:  #7a97b5;
      --blue-dim: #3d5470;
      --dark:     #181c24;
      --dark2:    #1e2330;
      --surface:  #242b3a;
      --card:     #2a3347;
      --border:   #354160;
      --text:     #dce6f0;
      --muted:    #7a90aa;
      --win:      #4a9e6e;
      --lose:     #b84040;
      --live:     #7eb8e8;
      --upcoming: #a0b8d0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(89,114,142,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(89,114,142,.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse at 10% 0%, rgba(89,114,142,.18) 0%, transparent 55%),
        radial-gradient(ellipse at 90% 100%, rgba(38,41,52,.5) 0%, transparent 55%);
    }
    .wrapper { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 0 20px 80px; }

    header {
      display: flex; align-items: center; gap: 18px;
      padding: 28px 0 22px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 36px;
    }
    .logo-wrap {
      flex-shrink: 0; width: 60px; height: 60px;
      background: #fff; border-radius: 10px;
      display: grid; place-items: center; padding: 6px;
      box-shadow: 0 4px 20px rgba(0,0,0,.4), 0 0 0 1px rgba(89,114,142,.3);
    }
    .logo-wrap img { width: 100%; height: 100%; object-fit: contain; }
    .header-text h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(1.4rem, 4vw, 2rem); font-weight: 900;
      letter-spacing: .03em; line-height: 1; color: #fff;
    }
    .header-text h1 em { color: var(--blue-lt); font-style: normal; }
    .header-sub {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .72rem; letter-spacing: .14em;
      text-transform: uppercase; color: var(--blue); margin-top: 4px;
    }
    .header-meta {
      margin-left: auto; text-align: right;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .72rem; letter-spacing: .06em;
      text-transform: uppercase; color: var(--muted); line-height: 1.7;
    }
    .header-meta strong { color: var(--blue-lt); font-weight: 700; }

    .tabs {
      display: flex; gap: 4px; margin-bottom: 28px;
      background: var(--dark2); border: 1px solid var(--border);
      border-radius: 10px; padding: 4px;
    }
    .tab {
      flex: 1; padding: 8px 12px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .8rem; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
      color: var(--muted); background: none; border: none;
      cursor: pointer; border-radius: 7px; transition: all .2s;
    }
    .tab.active { background: var(--blue); color: #fff; box-shadow: 0 2px 10px rgba(89,114,142,.4); }
    .tab:hover:not(.active) { color: var(--text); background: rgba(89,114,142,.1); }
    .tab .count {
      display: inline-block; background: rgba(255,255,255,.15);
      border-radius: 10px; padding: 0 6px; margin-left: 4px; font-size: .65rem;
    }

    .section-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .68rem; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--blue-dim); margin-bottom: 12px; padding-left: 2px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .match-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; margin-bottom: 14px; overflow: hidden;
      transition: transform .15s, box-shadow .15s;
    }
    .match-card:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(0,0,0,.35); }
    .match-card.featured { border-color: var(--blue); box-shadow: 0 0 0 1px var(--blue), 0 8px 40px rgba(89,114,142,.2); }
    .match-card.featured .card-top { background: var(--card); }

    .card-top {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      padding: 11px 18px; background: rgba(0,0,0,.2);
      border-bottom: 1px solid var(--border);
    }
    .tag {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .65rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      border-radius: 4px; padding: 2px 8px;
    }
    .tag.bewerb { background: rgba(89,114,142,.18); color: var(--blue-lt); border: 1px solid rgba(89,114,142,.3); }
    .tag.runde  { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .status-pill {
      margin-left: auto;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .65rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      border-radius: 20px; padding: 3px 11px;
    }
    .status-pill.upcoming { background: rgba(160,184,208,.1); color: var(--upcoming); border: 1px solid rgba(160,184,208,.2); }
    .status-pill.live     { background: rgba(126,184,232,.15); color: var(--live); border: 1px solid rgba(126,184,232,.3); animation: blink 1.6s infinite; }
    .status-pill.finished { background: rgba(74,158,110,.12); color: var(--win); border: 1px solid rgba(74,158,110,.25); }
    .status-pill.error    { background: rgba(184,64,64,.12); color: #e07070; border: 1px solid rgba(184,64,64,.25); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.55} }

    .scoreboard {
      display: grid; grid-template-columns: 1fr auto 1fr;
      gap: 16px; align-items: center; padding: 18px 18px 14px;
    }
    .team { display: flex; flex-direction: column; }
    .team.away { align-items: flex-end; text-align: right; }
    .team-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(.95rem, 2.8vw, 1.25rem);
      font-weight: 800; line-height: 1.1; color: #fff;
    }
    .team-name.andorf { color: var(--blue-lt); }
    .team-meta { font-family: 'Barlow Condensed', sans-serif; font-size: .7rem; color: var(--muted); letter-spacing: .04em; margin-top: 3px; }
    .score-center { text-align: center; }
    .score-big {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 900; letter-spacing: .02em; line-height: 1; color: #fff;
    }
    .score-big.pending { color: var(--muted); font-size: 1rem; letter-spacing: .06em; }
    .score-sep { color: var(--border); margin: 0 3px; }
    .score-date { font-family: 'Barlow Condensed', sans-serif; font-size: .72rem; color: var(--muted); letter-spacing: .05em; margin-top: 2px; }

    .details-toggle {
      display: flex; align-items: center; justify-content: center;
      gap: 6px; padding: 8px 18px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .7rem; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
      color: var(--muted); cursor: pointer;
      background: none; width: 100%; border: none;
      border-top: 1px solid var(--border);
      transition: color .15s, background .15s;
    }
    .details-toggle:hover { color: var(--text); background: rgba(89,114,142,.06); }
    .details-panel { display: none; border-top: 1px solid var(--border); }
    .details-panel.open { display: block; }

    .sub-section {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .65rem; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--blue-dim); padding: 8px 18px 4px;
      border-top: 1px solid var(--border); background: rgba(0,0,0,.15);
    }
    .sub-section:first-child { border-top: none; }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .62rem; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: var(--muted); padding: 5px 18px;
      text-align: left; background: rgba(0,0,0,.12);
    }
    thead th.c { text-align: center; }
    tbody tr { border-top: 1px solid rgba(53,65,96,.5); transition: background .12s; }
    tbody tr:hover { background: rgba(89,114,142,.06); }
    td { padding: 9px 18px; font-size: .84rem; vertical-align: middle; }
    .player { font-weight: 600; }
    .itn {
      display: inline-block; font-size: .62rem;
      background: rgba(89,114,142,.12); color: var(--muted);
      border-radius: 3px; padding: 1px 5px; margin-left: 5px;
      font-family: 'Barlow Condensed', sans-serif; vertical-align: middle;
    }
    .sets { text-align: center; font-family: 'Barlow Condensed', sans-serif; }
    .set { display: inline-block; min-width: 32px; text-align: center; font-size: .88rem; }
    .set.w { font-weight: 700; color: #fff; }
    .set.l { color: var(--muted); }
    .dot-w { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--win); box-shadow:0 0 5px var(--win); margin-left:6px; vertical-align:middle; }

    .no-data { padding:16px 18px; text-align:center; color:var(--muted); font-size:.82rem; font-family:'Barlow Condensed',sans-serif; letter-spacing:.05em; }
    .error-bar { padding:12px 18px; color:#e07070; font-size:.82rem; background:rgba(184,64,64,.08); border-top:1px solid rgba(184,64,64,.18); }
    .empty-state { padding: 48px 20px; text-align: center; color: var(--muted); font-family: 'Barlow Condensed', sans-serif; font-size: .9rem; letter-spacing: .06em; }

    .skel { background: linear-gradient(90deg, var(--surface) 25%, var(--card) 50%, var(--surface) 75%); background-size:200% 100%; animation: shimmer 1.4s infinite; border-radius:6px; height:16px; margin:5px 0; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    footer {
      margin-top: 48px; padding-top: 20px; border-top: 1px solid var(--border);
      text-align: center; font-family: 'Barlow Condensed', sans-serif;
      font-size: .68rem; letter-spacing: .07em; text-transform: uppercase; color: var(--muted);
    }
    footer a { color: var(--muted); }
  </style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="logo-wrap">
      <img src="11_Logo_simpel_schwarz_2.jpg" alt="TV McDonald's Andorf" />
    </div>
    <div class="header-text">
      <h1>TV <em>McDonald's</em> Andorf</h1>
      <div class="header-sub">Mannschaftsmeisterschaft 2026</div>
    </div>
    <div class="header-meta">
      <div>Aktualisiert <strong id="last-refresh">–</strong></div>
      <div>Nächste Abfrage in <strong id="countdown">60s</strong></div>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('today')" id="tab-today">Heute <span class="count" id="cnt-today">0</span></button>
    <button class="tab" onclick="switchTab('upcoming')" id="tab-upcoming">Ausstehend <span class="count" id="cnt-upcoming">0</span></button>
    <button class="tab" onclick="switchTab('finished')" id="tab-finished">Ergebnisse <span class="count" id="cnt-finished">0</span></button>
    <button class="tab" onclick="switchTab('all')" id="tab-all">Alle <span class="count" id="cnt-all">0</span></button>
  </div>

  <div id="container">
    <div class="match-card"><div class="card-top"><div class="skel" style="width:130px"></div></div><div style="padding:18px"><div class="skel" style="width:75%"></div><div class="skel" style="width:45%;margin-top:8px"></div></div></div>
    <div class="match-card"><div class="card-top"><div class="skel" style="width:110px"></div></div><div style="padding:18px"><div class="skel" style="width:80%"></div><div class="skel" style="width:50%;margin-top:8px"></div></div></div>
  </div>

  <footer>
    Datenquelle: <a href="https://oetv-austria.liga.nu" target="_blank">ÖTVAT Austria Liga</a>
    &nbsp;·&nbsp; TV McDonald's Andorf &nbsp;·&nbsp; <span id="footer-ts"></span>
  </footer>
</div>

<script>
const RESULTS_URL = 'results.json';
const REFRESH_MS  = 60_000;
let allMatches = [], currentTab = 'today', countdownSec = 60, countdownTimer;

function todayISO() { return new Date().toLocaleDateString('sv-SE'); }
function fmtTime(iso) { if (!iso) return '–'; return new Date(iso).toLocaleTimeString('de-AT', {hour:'2-digit',minute:'2-digit',second:'2-digit'}); }
function isAndorf(name) { return name && name.toLowerCase().includes('andorf'); }
function statusLabel(s) { return {upcoming:'Ausstehend',live:'● Live',finished:'Beendet',error:'Fehler'}[s]||s; }

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  renderMatches();
}

function filterMatches(matches) {
  const today = todayISO();
  if (currentTab === 'today')    return matches.filter(m => m.header?.datum_iso === today || m.status === 'live');
  if (currentTab === 'upcoming') return matches.filter(m => m.status === 'upcoming' && m.header?.datum_iso > today);
  if (currentTab === 'finished') return matches.filter(m => m.status === 'finished');
  return matches;
}

function updateCounts(matches) {
  const today = todayISO();
  document.getElementById('cnt-today').textContent    = matches.filter(m => m.header?.datum_iso === today || m.status === 'live').length;
  document.getElementById('cnt-upcoming').textContent = matches.filter(m => m.status === 'upcoming' && m.header?.datum_iso > today).length;
  document.getElementById('cnt-finished').textContent = matches.filter(m => m.status === 'finished').length;
  document.getElementById('cnt-all').textContent      = matches.length;
}

function renderSet(val, isWin) {
  if (!val) return `<span class="set" style="color:var(--border)">–</span>`;
  return `<span class="set ${isWin?'w':'l'}">${val}</span>`;
}

function renderSingles(singles) {
  if (!singles?.length) return `<div class="no-data">Keine Einzel-Daten</div>`;
  return `<table><thead><tr><th>#</th><th>Heim</th><th>Gast</th><th class="c">Sätze</th></tr></thead><tbody>` +
    singles.map(s => {
      const hw = s.winner==='heim';
      return `<tr>
        <td style="width:24px;color:var(--muted);font-family:'Barlow Condensed',sans-serif">${s.nr}</td>
        <td class="player">${s.heim}<span class="itn">${s.heim_itn}</span>${hw?'<span class="dot-w"></span>':''}</td>
        <td class="player">${s.gast}<span class="itn">${s.gast_itn}</span>${!hw?'<span class="dot-w"></span>':''}</td>
        <td class="sets">${renderSet(s.satz1,hw)} ${renderSet(s.satz2,hw)} ${s.satz3?renderSet(s.satz3,hw):''}</td>
      </tr>`;
    }).join('') + `</tbody></table>`;
}

function renderDoubles(doubles) {
  if (!doubles?.length) return `<div class="no-data">Keine Doppel-Daten</div>`;
  return `<table><thead><tr><th>#</th><th>Heim</th><th>Gast</th><th class="c">Sätze</th></tr></thead><tbody>` +
    doubles.map(d => {
      const hw = d.winner==='heim';
      return `<tr>
        <td style="width:24px;color:var(--muted);font-family:'Barlow Condensed',sans-serif">${d.nr}</td>
        <td class="player">${d.heim||'–'}${hw?'<span class="dot-w"></span>':''}</td>
        <td class="player">${d.gast||'–'}${!hw?'<span class="dot-w"></span>':''}</td>
        <td class="sets">${renderSet(d.satz1,hw)} ${renderSet(d.satz2,hw)} ${d.satz3?renderSet(d.satz3,hw):''}</td>
      </tr>`;
    }).join('') + `</tbody></table>`;
}

function renderCard(m, featured) {
  const h = m.header || {};
  const feat = featured || h.datum_iso === todayISO();
  const hS = h.ergebnis_heim ?? '–', gS = h.ergebnis_gast ?? '–';
  const scoreHtml = (m.status==='finished'||m.status==='live')
    ? `<div class="score-big">${hS}<span class="score-sep">:</span>${gS}</div>`
    : `<div class="score-big pending">${h.datum||'?'}<br><span style="font-size:.8rem">${h.uhrzeit||''}</span></div>`;
  const hasDetails = m.singles?.length || m.doubles?.length;
  const did = `d-${m.meeting_id}`, bid = `b-${m.meeting_id}`;
  return `<div class="match-card ${feat?'featured':''}">
    <div class="card-top">
      <span class="tag bewerb">${h.gruppe||h.bewerb||'Tennis'}</span>
      <span class="tag runde">${h.runde||''}</span>
      <span class="tag runde">${h.datum||''}</span>
      <span class="status-pill ${m.status}">${statusLabel(m.status)}</span>
    </div>
    <div class="scoreboard">
      <div class="team home">
        <div class="team-name ${isAndorf(h.heim)?'andorf':''}">${h.heim||'–'}</div>
        ${isAndorf(h.heim)?'<div class="team-meta">Heimmannschaft</div>':''}
      </div>
      <div class="score-center">${scoreHtml}</div>
      <div class="team away">
        <div class="team-name ${isAndorf(h.gast)?'andorf':''}">${h.gast||'–'}</div>
        ${isAndorf(h.gast)?'<div class="team-meta">Gastmannschaft</div>':''}
      </div>
    </div>
    ${m.status==='error'?`<div class="error-bar">⚠ ${m.error||'Fehler'}</div>`:''}
    ${hasDetails?`
      <button class="details-toggle" id="${bid}" onclick="toggleDetails('${did}','${bid}')">Details anzeigen <span>▾</span></button>
      <div class="details-panel ${feat?'open':''}" id="${did}">
        <div class="sub-section">Einzel</div>${renderSingles(m.singles)}
        <div class="sub-section">Doppel</div>${renderDoubles(m.doubles)}
      </div>`:''}
  </div>`;
}

function toggleDetails(did, bid) {
  const panel = document.getElementById(did);
  const open = panel.classList.toggle('open');
  document.getElementById(bid).innerHTML = `${open?'Details ausblenden':'Details anzeigen'} <span style="display:inline-block;transform:rotate(${open?180:0}deg);transition:transform .2s">▾</span>`;
}

function renderMatches() {
  const container = document.getElementById('container');
  const filtered = filterMatches(allMatches);
  const today = todayISO();
  if (!filtered.length) {
    const msgs = {today:'Heute keine Spiele geplant.',upcoming:'Keine ausstehenden Spiele.',finished:'Noch keine abgeschlossenen Spiele.',all:'Keine Spiele geladen.'};
    container.innerHTML = `<div class="empty-state">${msgs[currentTab]||'Keine Daten.'}</div>`;
    return;
  }
  if (currentTab === 'today') {
    container.innerHTML = filtered.map(m => renderCard(m, true)).join('');
  } else {
    const groups = {};
    filtered.forEach(m => { const k = m.header?.datum_iso||'9999'; if(!groups[k]) groups[k]=[]; groups[k].push(m); });
    let html = '';
    Object.keys(groups).sort().forEach(k => {
      const label = k===today ? 'Heute' : new Date(k).toLocaleDateString('de-AT',{weekday:'long',day:'2-digit',month:'long'});
      html += `<div class="section-label">${label}</div>`;
      groups[k].forEach(m => html += renderCard(m, false));
    });
    container.innerHTML = html;
  }
}

async function loadData() {
  try {
    const res = await fetch(RESULTS_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    allMatches = data.matches || [];
    updateCounts(allMatches);
    renderMatches();
    document.getElementById('last-refresh').textContent = fmtTime(data.generated_at);
    document.getElementById('footer-ts').textContent = `Stand: ${fmtTime(data.generated_at)}`;
  } catch(e) {
    document.getElementById('container').innerHTML = `<div class="empty-state">Fehler: ${e.message}</div>`;
  }
}

function startCountdown() {
  countdownSec = 60;
  clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    document.getElementById('countdown').textContent = (--countdownSec) + 's';
    if (countdownSec <= 0) { clearInterval(countdownTimer); loadData().then(startCountdown); }
  }, 1000);
}

loadData().then(startCountdown);
</script>
</body>
</html>
