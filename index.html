<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tennis Live – TV Andorf vs UTC Wernstein</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --clay:   #c8572a;
      --clay-lt:#e8734a;
      --court:  #1a2e1a;
      --net:    #2e4a2e;
      --lime:   #b8e04a;
      --white:  #f5f0e8;
      --muted:  #8a9a7a;
      --border: #3a5a3a;
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body {
      background:var(--court); color:var(--white);
      font-family:'DM Sans',sans-serif; min-height:100vh;
      padding:2rem 1.5rem 4rem;
      background-image:
        repeating-linear-gradient(0deg,transparent,transparent 59px,rgba(255,255,255,.03) 59px,rgba(255,255,255,.03) 60px),
        repeating-linear-gradient(90deg,transparent,transparent 59px,rgba(255,255,255,.03) 59px,rgba(255,255,255,.03) 60px);
    }
    header {
      max-width:860px; margin:0 auto 2.5rem;
      display:flex; align-items:flex-end; justify-content:space-between; gap:1rem;
      border-bottom:2px solid var(--border); padding-bottom:1rem;
    }
    .header-left h1 { font-family:'Bebas Neue',sans-serif; font-size:clamp(2rem,6vw,3.5rem); letter-spacing:.04em; color:var(--lime); line-height:1; }
    .header-left p   { font-size:.8rem; color:var(--muted); margin-top:.35rem; font-family:'DM Mono',monospace; }
    .status-badge    { display:flex; flex-direction:column; align-items:flex-end; gap:.4rem; }
    .pulse-dot       { width:10px; height:10px; border-radius:50%; background:var(--lime); box-shadow:0 0 8px var(--lime); animation:pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
    #next-refresh { font-family:'DM Mono',monospace; font-size:.72rem; color:var(--muted); }
    #last-updated { font-family:'DM Mono',monospace; font-size:.68rem; color:var(--muted); }
    .container { max-width:860px; margin:0 auto; }
    .score-banner {
      background:var(--clay); border-radius:4px; padding:1.5rem 2rem; margin-bottom:1.8rem;
      display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:1rem;
      position:relative; overflow:hidden;
    }
    .score-banner::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,.07) 0%,transparent 60%); pointer-events:none; }
    .team-name { font-family:'Bebas Neue',sans-serif; font-size:clamp(1.1rem,3vw,1.6rem); letter-spacing:.05em; line-height:1.1; position:relative; }
    .team-name.home { text-align:left; }
    .team-name.away { text-align:right; }
    .score-digits { font-family:'Bebas Neue',sans-serif; font-size:clamp(3rem,8vw,5rem); letter-spacing:.1em; color:var(--lime); text-align:center; white-space:nowrap; position:relative; }
    .meta-strip { display:flex; gap:1.2rem; flex-wrap:wrap; margin-bottom:2rem; }
    .meta-chip  { background:var(--net); border:1px solid var(--border); border-radius:2px; padding:.3rem .75rem; font-size:.72rem; font-family:'DM Mono',monospace; color:var(--muted); }
    .meta-chip span { color:var(--white); }
    .section-title { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; letter-spacing:.08em; color:var(--lime); margin-bottom:.8rem; display:flex; align-items:center; gap:.6rem; }
    .section-title::after { content:''; flex:1; height:1px; background:var(--border); }
    .match-table { width:100%; border-collapse:collapse; margin-bottom:2.2rem; font-size:.82rem; }
    .match-table thead th { background:var(--net); color:var(--muted); font-family:'DM Mono',monospace; font-weight:400; font-size:.7rem; letter-spacing:.06em; text-transform:uppercase; padding:.5rem .75rem; text-align:left; border-bottom:1px solid var(--border); }
    .match-table thead th.c { text-align:center; }
    .match-table tbody tr   { border-bottom:1px solid var(--border); transition:background .15s; }
    .match-table tbody tr:hover { background:rgba(255,255,255,.04); }
    .match-table tbody td   { padding:.65rem .75rem; vertical-align:middle; }
    .match-table tbody td.c { text-align:center; }
    .player-name { font-weight:600; }
    .player-itn  { font-family:'DM Mono',monospace; font-size:.68rem; color:var(--muted); margin-top:.1rem; }
    .set-score   { font-family:'DM Mono',monospace; font-size:.82rem; white-space:nowrap; }
    .wb   { display:inline-block; padding:.15rem .55rem; border-radius:2px; font-family:'DM Mono',monospace; font-size:.68rem; font-weight:500; letter-spacing:.05em; }
    .wb-h { background:var(--lime); color:#111; }
    .wb-g { background:var(--clay); color:var(--white); }
    .totals-row td   { background:var(--net)!important; font-family:'DM Mono',monospace; font-size:.75rem; color:var(--muted); border-top:2px solid var(--border)!important; }
    .totals-row td b { color:var(--white); }
    .gesamt-bar { background:var(--net); border:1px solid var(--border); border-radius:3px; padding:.9rem 1.2rem; display:flex; flex-wrap:wrap; gap:1.5rem; font-family:'DM Mono',monospace; font-size:.78rem; color:var(--muted); margin-bottom:2rem; }
    .gesamt-bar b { color:var(--white); }
    #status-bar { max-width:860px; margin:0 auto 1.5rem; padding:.8rem 1.2rem; border-radius:3px; font-family:'DM Mono',monospace; font-size:.8rem; display:none; }
    footer { max-width:860px; margin:3rem auto 0; font-size:.7rem; color:var(--muted); font-family:'DM Mono',monospace; text-align:center; border-top:1px solid var(--border); padding-top:1rem; }
    @media(max-width:600px) {
      .match-table { font-size:.75rem; }
      .match-table tbody td { padding:.5rem .4rem; }
      .score-banner { padding:1rem; gap:.5rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Tennis Live</h1>
    <p id="liga-label">OÖ. Wintermeisterschaft 2025/2026 · Ried Herren 1</p>
  </div>
  <div class="status-badge">
    <div class="pulse-dot"></div>
    <div id="next-refresh">Lade…</div>
    <div id="last-updated"></div>
  </div>
</header>

<div id="status-bar"></div>
<div class="container" id="main-content"></div>

<footer>Daten werden jede Minute von GitHub Actions aktualisiert · Quelle: oetv-austria.liga.nu</footer>

<script>
const DATA_URL    = "https://tennisandorf.github.io/live/data.json";
const REFRESH_SEC = 60;
let countdown     = REFRESH_SEC;
let timerInterval = null;
let lastGoodData  = null;

// ── Fetch data.json (kein CORS-Problem, gleiche Origin) ───────────────────
async function fetchData() {
  const res = await fetch(DATA_URL + "?t=" + Date.now(), { cache: "no-store" });
  if (!res.ok) throw new Error("HTTP " + res.status);
  return await res.json();
}

// ── Render ────────────────────────────────────────────────────────────────
function render(d) {
  const wb = w => w === "heim"
    ? `<span class="wb wb-h">HEIM</span>`
    : `<span class="wb wb-g">GAST</span>`;

  const thead = `<thead><tr>
    <th class="c">#</th><th>Heim</th><th>Gast</th>
    <th class="c">Satz 1</th><th class="c">Satz 2</th><th class="c">Satz 3</th>
    <th class="c">Sieger</th>
  </tr></thead>`;

  const einzelRows = (d.einzel || []).map(e => `<tr>
    <td class="c" style="color:var(--muted);font-family:'DM Mono',monospace">${e.nr}</td>
    <td><div class="player-name">${e.heimSpieler}</div><div class="player-itn">ITN ${e.heimITN}</div></td>
    <td><div class="player-name">${e.gastSpieler}</div><div class="player-itn">ITN ${e.gastITN}</div></td>
    <td class="c set-score">${e.satz1}</td>
    <td class="c set-score">${e.satz2}</td>
    <td class="c set-score" style="color:var(--muted)">${e.satz3}</td>
    <td class="c">${wb(e.winner)}</td>
  </tr>`).join("") + (d.einzelSum ? `<tr class="totals-row">
    <td colspan="3" style="padding-left:.75rem">Einzel-Summe</td>
    <td class="c"><b>${d.einzelSum.mH}</b>:${d.einzelSum.mG}&nbsp;M</td>
    <td class="c"><b>${d.einzelSum.sH}</b>:${d.einzelSum.sG}&nbsp;S</td>
    <td class="c"><b>${d.einzelSum.gH}</b>:${d.einzelSum.gG}&nbsp;G</td>
    <td></td>
  </tr>` : "");

  const doppelRows = (d.doppel || []).map(e => `<tr>
    <td class="c" style="color:var(--muted);font-family:'DM Mono',monospace">${e.nr}</td>
    <td><div class="player-name">${e.heimPaar}</div></td>
    <td><div class="player-name">${e.gastPaar}</div></td>
    <td class="c set-score">${e.satz1}</td>
    <td class="c set-score">${e.satz2}</td>
    <td class="c set-score" style="color:var(--muted)">${e.satz3}</td>
    <td class="c">${wb(e.winner)}</td>
  </tr>`).join("") + (d.doppelSum ? `<tr class="totals-row">
    <td colspan="3" style="padding-left:.75rem">Doppel-Summe</td>
    <td class="c"><b>${d.doppelSum.mH}</b>:${d.doppelSum.mG}&nbsp;M</td>
    <td class="c"><b>${d.doppelSum.sH}</b>:${d.doppelSum.sG}&nbsp;S</td>
    <td class="c"><b>${d.doppelSum.gH}</b>:${d.doppelSum.gG}&nbsp;G</td>
    <td></td>
  </tr>` : "");

  document.getElementById("main-content").innerHTML = `
    <div class="score-banner">
      <div class="team-name home">${d.heimTeam}</div>
      <div class="score-digits">${d.gesamtHeim}&nbsp;:&nbsp;${d.gesamtGast}</div>
      <div class="team-name away">${d.gastTeam}</div>
    </div>
    <div class="meta-strip">
      <div class="meta-chip">Liga <span>${d.liga || "OÖ. Wintermeisterschaft 2025/26"}</span></div>
      <div class="meta-chip">Runde <span>${d.runde || "—"}</span></div>
      <div class="meta-chip">Datum <span>${d.termin || "—"}</span></div>
    </div>
    <div class="section-title">Einzel</div>
    <table class="match-table">${thead}<tbody>${einzelRows}</tbody></table>
    <div class="section-title">Doppel</div>
    <table class="match-table">${thead}<tbody>${doppelRows}</tbody></table>
    ${d.gesamtSum ? `<div class="gesamt-bar">
      <span>Matches <b>${d.gesamtSum.mH} : ${d.gesamtSum.mG}</b></span>
      <span>Sätze <b>${d.gesamtSum.sH} : ${d.gesamtSum.sG}</b></span>
      <span>Games <b>${d.gesamtSum.gH} : ${d.gesamtSum.gG}</b></span>
    </div>` : ""}`;

  document.getElementById("liga-label").textContent =
    (d.liga || "OÖ. Wintermeisterschaft 2025/26") + " · Ried Herren 1";
}

// ── Status ────────────────────────────────────────────────────────────────
function showStatus(type, msg) {
  const el = document.getElementById("status-bar");
  Object.assign(el.style, {
    display:    "block",
    background: type === "error" ? "rgba(200,87,42,.15)" : "var(--net)",
    border:     "1px solid " + (type === "error" ? "var(--clay)" : "var(--border)"),
    color:      type === "error" ? "var(--clay-lt)" : "var(--muted)"
  });
  el.textContent = msg;
}
function hideStatus() { document.getElementById("status-bar").style.display = "none"; }

// ── Haupt-Loop ────────────────────────────────────────────────────────────
async function refresh() {
  showStatus("loading", "⏳ Daten werden geladen…");
  try {
    const data = await fetchData();
    lastGoodData = data;
    render(data);
    hideStatus();
    document.getElementById("last-updated").textContent =
      "PDF-Stand: " + (data.updated || "—");
  } catch (e) {
    if (lastGoodData) render(lastGoodData);
    showStatus("error", "⚠ Laden fehlgeschlagen – zeige letzte bekannte Daten (" + e.message + ")");
  }
}

function startCountdown() {
  countdown = REFRESH_SEC;
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    countdown--;
    document.getElementById("next-refresh").textContent = `Aktualisierung in ${countdown}s`;
    if (countdown <= 0) { refresh(); countdown = REFRESH_SEC; }
  }, 1000);
}

refresh();
startCountdown();
</script>
</body>
</html>
