<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, initial-scale=1.0" />
  <title>TV McDonald's Andorf – Live Ergebnisse</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue:     #59728E;
      --blue-lt:  #7a97b5;
      --blue-dim: #3d5470;
      --dark:     #0f1318;
      --dark2:    #161b24;
      --surface:  #1e2535;
      --card:     #252f42;
      --border:   #2e3d5c;
      --text:     #e0eaf5;
      --muted:    #7a90aa;
      --win:      #3d9e62;
      --lose:     #b84040;
      --live:     #5baee0;
      --upcoming: #8aaec8;
      --fs-base:  22px;
      --fs-sm:    18px;
      --fs-xs:    15px;
      --fs-label: 13px;
      --fs-score: 72px;
      --fs-team:  28px;
      --fs-h1:    38px;
      --pad:      28px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1920px; min-height: 1080px; overflow-x: hidden; }
    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: var(--fs-base);
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(89,114,142,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(89,114,142,.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    body::after {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse at 5% 0%, rgba(89,114,142,.15) 0%, transparent 45%),
        radial-gradient(ellipse at 95% 100%, rgba(15,19,24,.8) 0%, transparent 45%);
    }

    .page {
      position: relative; z-index: 1;
      width: 1920px; padding: 36px 60px 40px;
      display: flex; flex-direction: column;
      min-height: 1080px;
      max-width: 1920px;
    }

    /* HEADER */
    header {
      display: flex; align-items: center; gap: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px; flex-shrink: 0;
    }
    .logo-wrap {
      flex-shrink: 0; width: 240px; height: 110px;
      background: #fff; border-radius: 14px;
      display: grid; place-items: center; padding: 10px;
      box-shadow: 0 6px 30px rgba(0,0,0,.5), 0 0 0 1px rgba(89,114,142,.3);
    }
    .logo-wrap img { width: 100%; height: 100%; object-fit: contain; }
    .header-text h1 {
      font-size: var(--fs-h1); font-weight: 700;
      letter-spacing: -.02em; line-height: 1; color: #fff;
    }
    .header-text h1 em { color: var(--blue-lt); font-style: normal; }
    .header-sub {
      font-size: var(--fs-sm); letter-spacing: .1em;
      text-transform: uppercase; color: var(--blue);
      margin-top: 8px; font-weight: 500;
    }
    .header-right { margin-left: auto; text-align: right; }
    .header-right .time-now {
      font-family: 'DM Mono', monospace;
      font-size: 48px; font-weight: 500;
      color: #fff; line-height: 1; letter-spacing: .02em;
    }
    .header-right .refresh-info {
      font-size: var(--fs-xs); color: var(--muted);
      margin-top: 8px; letter-spacing: .04em;
    }
    .header-right .refresh-info strong { color: var(--blue-lt); }

    /* TABS */
    .tabs {
      display: flex; gap: 4px; margin-bottom: 20px;
      background: var(--dark2); border: 1px solid var(--border);
      border-radius: 10px; padding: 4px; flex-shrink: 0;
    }
    .tab {
      flex: 1; padding: 10px 16px;
      font-size: 16px; font-weight: 600;
      letter-spacing: .05em; text-transform: uppercase;
      color: var(--muted); background: none; border: none;
      cursor: pointer; border-radius: 7px; transition: background .2s, color .2s;
    }
    .tab.active { background: var(--blue); color: #fff; box-shadow: 0 2px 16px rgba(89,114,142,.4); }
    .tab .count {
      display: inline-block; background: rgba(255,255,255,.15);
      border-radius: 20px; padding: 2px 10px;
      margin-left: 6px; font-size: var(--fs-xs);
    }

    /* SECTION LABEL */
    .section-label {
      font-size: var(--fs-label); font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--blue-dim); margin-bottom: 16px;
      display: flex; align-items: center; gap: 12px;
      justify-content: center;
    }
    .section-label::before { content: ''; flex: 1; height: 1px; background: var(--border); }
    .section-label::after  { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* 2-Spalten Grid */
    .cards-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-content: start;
      justify-content: center;
    }
    .cards-grid.single {
      grid-template-columns: 1fr;
    }
    .cards-grid.two-up {
      grid-template-columns: 1fr 1fr;
    }

    /* MATCH CARD */
    .match-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden;
    }
    .match-card.featured {
      border-color: var(--blue);
      box-shadow: 0 0 0 1px var(--blue), 0 8px 50px rgba(89,114,142,.2);
    }

    /* Card Banner */
    .card-banner {
      padding: 12px var(--pad) 10px;
      background: linear-gradient(135deg, rgba(89,114,142,.25) 0%, rgba(22,27,36,.7) 100%);
      border-bottom: 1px solid var(--border);
      position: relative; overflow: hidden;
    }
    .card-banner::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 4px; background: var(--blue);
    }
    .card-banner.live-banner::before     { background: var(--live); }
    .card-banner.finished-banner::before { background: var(--win); }

    .banner-liga {
      font-size: var(--fs-sm); font-weight: 600;
      color: #fff; margin-bottom: 8px; letter-spacing: -.01em;
    }
    .banner-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .banner-chip {
      font-size: var(--fs-xs); font-weight: 500;
      letter-spacing: .03em; padding: 4px 12px; border-radius: 20px;
    }
    .banner-chip.datum { background: rgba(89,114,142,.2); color: var(--blue-lt); border: 1px solid rgba(89,114,142,.3); }
    .banner-chip.runde { background: rgba(255,255,255,.06); color: var(--muted); border: 1px solid rgba(255,255,255,.1); }
    .status-pill {
      margin-left: auto;
      font-size: var(--fs-xs); font-weight: 600;
      letter-spacing: .08em; text-transform: uppercase;
      border-radius: 20px; padding: 5px 14px;
    }
    .status-pill.upcoming { background: rgba(160,184,208,.1); color: var(--upcoming); border: 1px solid rgba(160,184,208,.2); }
    .status-pill.live     { background: rgba(91,174,224,.15); color: var(--live); border: 1px solid rgba(91,174,224,.3); animation: blink 1.6s infinite; }
    .status-pill.finished { background: rgba(61,158,98,.12); color: var(--win); border: 1px solid rgba(61,158,98,.3); }
    .status-pill.error    { background: rgba(184,64,64,.12); color: #e07070; border: 1px solid rgba(184,64,64,.25); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.5} }

    /* Scoreboard */
    .scoreboard {
      display: grid; grid-template-columns: 1fr auto 1fr;
      gap: 16px; align-items: center;
      padding: 18px var(--pad) 14px;
    }
    .team { display: flex; flex-direction: column; }
    .team.away { align-items: flex-end; text-align: right; }
    .team-name {
      font-size: 24px; font-weight: 700;
      line-height: 1.2; color: #fff; letter-spacing: -.01em;
    }
    .team-name.andorf { color: var(--blue-lt); }
    .team-meta { font-size: 13px; color: var(--muted); margin-top: 3px; }
    .score-center { text-align: center; }
    .score-big {
      font-family: 'DM Mono', monospace;
      font-size: 60px; font-weight: 500;
      line-height: 1; color: #fff; letter-spacing: .02em;
    }
    .score-big.pending {
      font-family: 'Inter', sans-serif;
      font-size: var(--fs-sm); color: var(--muted); font-weight: 400;
    }
    .score-sep { color: var(--border); margin: 0 6px; }

    /* Details */
    .details-toggle {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; padding: 10px var(--pad);
      font-size: var(--fs-xs); font-weight: 500;
      letter-spacing: .05em; text-transform: uppercase;
      color: var(--muted); cursor: pointer;
      background: none; width: 100%; border: none;
      border-top: 1px solid var(--border);
    }
    .details-panel { display: none; border-top: 1px solid var(--border); }
    .details-panel.open { display: block; }
    .sub-section {
      font-size: var(--fs-label); font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--blue-dim); padding: 6px var(--pad) 4px;
      border-top: 1px solid var(--border); background: rgba(0,0,0,.2);
    }
    .sub-section:first-child { border-top: none; }

    /* Einzel/Doppel Layout */
    .details-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }
    .cards-grid.two-up .details-cols {
      grid-template-columns: 1fr;
    }
    .details-col { border-right: 1px solid var(--border); }
    .details-col:last-child { border-right: none; }
    .cards-grid.two-up .details-col { border-right: none; border-top: 1px solid var(--border); }
    .cards-grid.two-up .details-col:first-child { border-top: none; }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      font-size: 11px; font-weight: 600;
      letter-spacing: .07em; text-transform: uppercase;
      color: var(--muted); padding: 5px 14px;
      text-align: left; background: rgba(0,0,0,.15);
    }
    thead th.c { text-align: center; }
    tbody tr { border-top: 1px solid rgba(46,61,92,.5); }
    td { padding: 8px 14px; font-size: 16px; vertical-align: middle; }
    .player { font-weight: 500; }
    .itn {
      display: inline-block; font-size: 13px;
      background: rgba(89,114,142,.12); color: var(--muted);
      border-radius: 4px; padding: 1px 6px; margin-left: 6px;
      font-family: 'DM Mono', monospace; vertical-align: middle;
    }
    .sets { text-align: center; font-family: 'DM Mono', monospace; }
    .set { display: inline-block; min-width: 36px; text-align: center; font-size: 16px; }
    .set.w { font-weight: 500; color: #fff; }
    .set.l { color: var(--muted); }
    .dot-w {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; background: var(--win);
      box-shadow: 0 0 5px var(--win); margin-left: 6px; vertical-align: middle;
    }
    .no-data { padding: 14px var(--pad); text-align: center; color: var(--muted); font-size: 16px; }
    .error-bar { padding: 12px var(--pad); color: #e07070; font-size: 16px; background: rgba(184,64,64,.08); border-top: 1px solid rgba(184,64,64,.18); }
    .empty-state { padding: 80px 20px; text-align: center; color: var(--muted); font-size: var(--fs-base); grid-column: 1/-1; }

    .skel { background: linear-gradient(90deg, var(--surface) 25%, var(--card) 50%, var(--surface) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 8px; height: 22px; margin: 8px 0; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    footer {
      margin-top: auto; padding-top: 24px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: var(--fs-xs); letter-spacing: .06em;
      text-transform: uppercase; color: var(--muted);
    }
    footer a { color: var(--muted); }
  </style>
</head>
<body>
<div class="page">

  <header>
    <div class="logo-wrap">
      <img src="11_Logo_simpel_schwarz_2.jpg" alt="TV McDonald's Andorf" />
    </div>
    <div class="header-text">
      <h1>TV <em>McDonald's</em> Andorf</h1>
      <div class="header-sub">Mannschaftsmeisterschaft 2026</div>
    </div>
    <div class="header-right">
      <div class="time-now" id="clock">--:--</div>
      <div class="refresh-info">
        Aktualisiert <strong id="last-refresh">–</strong>
        &nbsp;·&nbsp; Nächste Abfrage in <strong id="countdown">60s</strong>
      </div>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('today')" id="tab-today">Heute <span class="count" id="cnt-today">0</span></button>
    <button class="tab" onclick="switchTab('upcoming')" id="tab-upcoming">Ausstehend <span class="count" id="cnt-upcoming">0</span></button>
    <button class="tab" onclick="switchTab('finished')" id="tab-finished">Ergebnisse <span class="count" id="cnt-finished">0</span></button>
    <button class="tab" onclick="switchTab('all')" id="tab-all">Alle <span class="count" id="cnt-all">0</span></button>
  </div>

  <div id="container" class="cards-grid">
    <div class="match-card"><div class="card-banner"><div class="skel" style="width:240px"></div><div class="skel" style="width:160px;margin-top:10px"></div></div><div style="padding:28px"><div class="skel" style="width:75%"></div><div class="skel" style="width:45%;margin-top:12px"></div></div></div>
    <div class="match-card"><div class="card-banner"><div class="skel" style="width:200px"></div><div class="skel" style="width:140px;margin-top:10px"></div></div><div style="padding:28px"><div class="skel" style="width:80%"></div><div class="skel" style="width:50%;margin-top:12px"></div></div></div>
  </div>

  <footer>
    Datenquelle: <a href="https://oetv-austria.liga.nu" target="_blank">ÖTVAT Austria Liga</a>
    &nbsp;·&nbsp; TV McDonald's Andorf
    &nbsp;·&nbsp; <span id="footer-ts"></span>
  </footer>
</div>

<script>
const RESULTS_URL = 'results.json';
let allMatches = [], currentTab = 'today', countdownSec = 60, countdownTimer;

function todayISO() { return new Date().toLocaleDateString('sv-SE'); }
function fmtTime(iso) { if (!iso) return '–'; return new Date(iso).toLocaleTimeString('de-AT', {hour:'2-digit',minute:'2-digit',second:'2-digit'}); }
function isAndorf(name) { return name && name.toLowerCase().includes('andorf'); }
function statusLabel(s) { return {upcoming:'Ausstehend',live:'● Live',finished:'Beendet',error:'Fehler'}[s]||s; }

// Live-Uhr
function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('de-AT', {hour:'2-digit', minute:'2-digit'});
}
updateClock();
setInterval(updateClock, 1000);

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  renderMatches();
}

function filterMatches(matches) {
  const today = todayISO();
  if (currentTab === 'today')    return matches.filter(m => m.header?.datum_iso === today || m.status === 'live');
  if (currentTab === 'upcoming') return matches.filter(m => m.status === 'upcoming' && m.header?.datum_iso > today);
  if (currentTab === 'finished') return matches.filter(m => m.status === 'finished');
  return matches;
}

function updateCounts(matches) {
  const today = todayISO();
  document.getElementById('cnt-today').textContent    = matches.filter(m => m.header?.datum_iso === today || m.status === 'live').length;
  document.getElementById('cnt-upcoming').textContent = matches.filter(m => m.status === 'upcoming' && m.header?.datum_iso > today).length;
  document.getElementById('cnt-finished').textContent = matches.filter(m => m.status === 'finished').length;
  document.getElementById('cnt-all').textContent      = matches.length;
}

function renderSet(val, isWin) {
  if (!val) return `<span class="set" style="color:var(--border)">–</span>`;
  return `<span class="set ${isWin?'w':'l'}">${val}</span>`;
}

function renderSingles(singles) {
  if (!singles?.length) return `<div class="no-data">Keine Einzel-Daten</div>`;
  return `<table><thead><tr><th>#</th><th>Heim</th><th>Gast</th><th class="c">Sätze</th></tr></thead><tbody>` +
    singles.map(s => {
      const hw = s.winner==='heim';
      return `<tr>
        <td style="width:36px;color:var(--muted);font-family:'DM Mono',monospace">${s.nr}</td>
        <td class="player">${s.heim}<span class="itn">${s.heim_itn}</span>${hw?'<span class="dot-w"></span>':''}</td>
        <td class="player">${s.gast}<span class="itn">${s.gast_itn}</span>${!hw?'<span class="dot-w"></span>':''}</td>
        <td class="sets">${renderSet(s.satz1,hw)} ${renderSet(s.satz2,hw)} ${s.satz3?renderSet(s.satz3,hw):''}</td>
      </tr>`;
    }).join('') + `</tbody></table>`;
}

function renderDoubles(doubles) {
  if (!doubles?.length) return `<div class="no-data">Keine Doppel-Daten</div>`;
  return `<table><thead><tr><th>#</th><th>Heim</th><th>Gast</th><th class="c">Sätze</th></tr></thead><tbody>` +
    doubles.map(d => {
      const hw = d.winner==='heim';
      return `<tr>
        <td style="width:36px;color:var(--muted);font-family:'DM Mono',monospace">${d.nr}</td>
        <td class="player">${d.heim||'–'}${hw?'<span class="dot-w"></span>':''}</td>
        <td class="player">${d.gast||'–'}${!hw?'<span class="dot-w"></span>':''}</td>
        <td class="sets">${renderSet(d.satz1,hw)} ${renderSet(d.satz2,hw)} ${d.satz3?renderSet(d.satz3,hw):''}</td>
      </tr>`;
    }).join('') + `</tbody></table>`;
}

function renderCard(m, featured) {
  const h = m.header || {};
  const feat = featured || h.datum_iso === todayISO();
  const hS = h.ergebnis_heim ?? '–', gS = h.ergebnis_gast ?? '–';
  const scoreHtml = (m.status==='finished'||m.status==='live')
    ? `<div class="score-big">${hS}<span class="score-sep">:</span>${gS}</div>`
    : `<div class="score-big pending">${h.datum||'?'} · ${h.uhrzeit||''} Uhr</div>`;
  const hasDetails = m.singles?.length || m.doubles?.length;
  const did = `d-${m.meeting_id}`, bid = `b-${m.meeting_id}`;
  const bannerClass = m.status==='live' ? 'live-banner' : m.status==='finished' ? 'finished-banner' : '';
  return `<div class="match-card ${feat?'featured':''}">
    <div class="card-banner ${bannerClass}">
      <div class="banner-liga">${h.gruppe || h.bewerb || 'Tennis'}</div>
      <div class="banner-meta">
        ${h.datum   ? `<span class="banner-chip datum">📅 ${h.datum}</span>` : ''}
        ${h.uhrzeit ? `<span class="banner-chip runde">🕐 ${h.uhrzeit} Uhr</span>` : ''}
        ${h.runde   ? `<span class="banner-chip runde">${h.runde}</span>` : ''}
        <span class="status-pill ${m.status}">${statusLabel(m.status)}</span>
      </div>
    </div>
    <div class="scoreboard">
      <div class="team home">
        <div class="team-name ${isAndorf(h.heim)?'andorf':''}">${h.heim||'–'}</div>
        ${isAndorf(h.heim)?'<div class="team-meta">Heimmannschaft</div>':''}
      </div>
      <div class="score-center">${scoreHtml}</div>
      <div class="team away">
        <div class="team-name ${isAndorf(h.gast)?'andorf':''}">${h.gast||'–'}</div>
        ${isAndorf(h.gast)?'<div class="team-meta">Gastmannschaft</div>':''}
      </div>
    </div>
    ${m.status==='error'?`<div class="error-bar">⚠ ${m.error||'Fehler'}</div>`:''}
    ${hasDetails?`
      <button class="details-toggle" id="${bid}" onclick="toggleDetails('${did}','${bid}')">Details anzeigen ▾</button>
      <div class="details-panel ${feat?'open':''}" id="${did}">
        <div class="details-cols">
          <div class="details-col">
            <div class="sub-section">Einzel</div>${renderSingles(m.singles)}
          </div>
          <div class="details-col">
            <div class="sub-section">Doppel</div>${renderDoubles(m.doubles)}
          </div>
        </div>
      </div>`:''}
  </div>`;
}

function toggleDetails(did, bid) {
  const panel = document.getElementById(did);
  const open = panel.classList.toggle('open');
  document.getElementById(bid).innerHTML = `${open?'Details ausblenden':'Details anzeigen'} ${open?'▴':'▾'}`;
}

function renderMatches() {
  const container = document.getElementById('container');
  const filtered = filterMatches(allMatches);
  const today = todayISO();
  if (!filtered.length) {
    const msgs = {today:'Heute keine Spiele geplant.',upcoming:'Keine ausstehenden Spiele.',finished:'Noch keine abgeschlossenen Spiele.',all:'Keine Spiele geladen.'};
    container.className = 'cards-grid';
    container.innerHTML = `<div class="empty-state">${msgs[currentTab]||'Keine Daten.'}</div>`;
    return;
  }
  container.className = filtered.length === 1 ? 'cards-grid' : filtered.length === 2 ? 'cards-grid two-up' : 'cards-grid';
  if (currentTab !== 'today') container.className = 'cards-grid single';
  if (currentTab === 'today') {
    container.innerHTML = filtered.map(m => renderCard(m, true)).join('');
  } else {
    const groups = {};
    filtered.forEach(m => { const k = m.header?.datum_iso||'9999'; if(!groups[k]) groups[k]=[]; groups[k].push(m); });
    let html = '';
    Object.keys(groups).sort().forEach(k => {
      const label = k===today ? 'Heute' : new Date(k).toLocaleDateString('de-AT',{weekday:'long',day:'2-digit',month:'long'});
      html += `<div class="section-label" style="grid-column:1/-1">${label}</div>`;
      groups[k].forEach(m => html += renderCard(m, false));
    });
    container.innerHTML = html;
  }
}

async function loadData() {
  try {
    const res = await fetch(RESULTS_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    allMatches = data.matches || [];
    updateCounts(allMatches);
    renderMatches();
    document.getElementById('last-refresh').textContent = fmtTime(data.generated_at);
    document.getElementById('footer-ts').textContent = `Stand: ${fmtTime(data.generated_at)}`;
  } catch(e) {
    document.getElementById('container').innerHTML = `<div class="empty-state">Fehler: ${e.message}</div>`;
  }
}

function startCountdown() {
  countdownSec = 60;
  clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    document.getElementById('countdown').textContent = (--countdownSec) + 's';
    if (countdownSec <= 0) { clearInterval(countdownTimer); loadData().then(startCountdown); }
  }, 1000);
}

loadData().then(startCountdown);
</script>
</body>
</html>
