<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tennis Spielstand - TV Image Mode</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');

    :root {
      --primary:   #59728E;
      --bg:        #1a1e28;
      --surface:   #262934;
      --border:    #3a4257;
      --text:      #dce6f0;
      --muted:     #7a8fa8;
      --accent:    #a8c4dc;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
      width: 100%; height: 100%; 
      background: var(--bg); 
      color: var(--text); 
      font-family: 'DM Sans', sans-serif; 
      overflow: hidden; 
    }

    #header {
      height: 70px; background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
    }

    .logo-text h1 { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 5px; color: var(--accent); }

    #status-bar { display: flex; align-items: center; gap: 20px; }
    #update-time { font-weight: bold; color: var(--text); }

    /* Container für das Bild */
    #content-wrap { 
      height: calc(100vh - 70px); 
      width: 100%; 
      display: flex; 
      justify-content: center; 
      align-items: flex-start; 
      overflow-y: auto; /* Falls das PDF länger als der Screen ist */
      background: #333;
    }

    #pdf-as-image {
      max-width: 100%;
      height: auto;
      display: block;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }

    #loading {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 100; opacity: 1; transition: opacity 0.5s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="header">
  <div class="logo-text">
    <h1 id="title">Spielstände</h1>
    <span id="subtitle" style="font-size: 0.7rem; color: var(--muted);">Lädt...</span>
  </div>
  <div id="status-bar">
    <div style="text-align: right; font-size: 0.7rem; color: var(--muted);">
      <span id="update-time">–</span><br>Aktualisierung
    </div>
    <div id="ring-num" style="font-size: 1.2rem; color: var(--primary); font-weight: bold; min-width: 30px;">60</div>
  </div>
</div>

<div id="content-wrap">
  <img id="pdf-as-image" src="" alt="Spielbericht">
</div>

<div id="loading">
  <div class="spinner"></div>
  <p style="margin-top:15px;">TV-KOMPATIBLER MODUS...</p>
</div>

<script>
// ═══════════════════════════════════════════════
//  KONFIGURATION
// ═══════════════════════════════════════════════
const PDF_LISTE = [
  { datum: "2026-05-07", url: "https://oetv-austria.liga.nu/cgi-bin/WebObjects/nuLigaDokumentTENAT.woa/wa/nuDokument?dokument=MeetingReportFOP&meeting=1866397&etag=7d2f969c-5eae-4c42-a487-2d2da6cc1a78" },
  { datum: "2026-05-07", url: "https://oetv-austria.liga.nu/cgi-bin/WebObjects/nuLigaDokumentTENAT.woa/wa/nuDokument?dokument=MeetingReportFOP&meeting=1861376&etag=299da4e5-dab8-47ab-ba2d-4c9581bc3d2f" }
];
const INTERVAL_SEK = 60;
// ═══════════════════════════════════════════════

let secondsLeft = INTERVAL_SEK;
let currentIndex = 0;
const imgElement = document.getElementById('pdf-as-image');
const loading = document.getElementById('loading');

function refresh() {
  const heute = new Date().toISOString().split('T')[0];
  const heutePDFs = PDF_LISTE.filter(p => p.datum === heute);

  if (heutePDFs.length === 0) {
    document.getElementById('subtitle').textContent = "Keine Spiele heute";
    loading.classList.add('hidden');
    return;
  }

  if (currentIndex >= heutePDFs.length) currentIndex = 0;
  const target = heutePDFs[currentIndex];

  loading.classList.remove('hidden');

  // DER TRICK: Wir nutzen einen freien PDF-to-Image Dienst (PDF.ai)
  // Dieser Dienst wandelt die URL in ein JPG um, das der TV anzeigen kann.
  const proxyUrl = "https://api.pdf.ai/render?url=" + encodeURIComponent(target.url);
  
  // Wir hängen einen Zeitstempel an, um den Cache des TVs zu umgehen
  imgElement.src = proxyUrl + "&t=" + Date.now();

  imgElement.onload = () => {
    loading.classList.add('hidden');
    document.getElementById('update-time').textContent = new Date().toLocaleTimeString('de-AT');
    document.getElementById('subtitle').textContent = heutePDFs.length > 1 ? `Bericht ${currentIndex + 1} von ${heutePDFs.length}` : "Live";
  };

  currentIndex++;
  secondsLeft = INTERVAL_SEK;
}

function tick() {
  document.getElementById('ring-num').textContent = secondsLeft;
  if (secondsLeft <= 0) refresh();
  else secondsLeft--;
}

refresh();
setInterval(tick, 1000);
</script>
</body>
</html>
