<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tennis Live Monitor - Ultra HQ</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap');
    :root { --primary: #59728E; --bg: #1a1e28; --surface: #262934; --text: #dce6f0; --accent: #a8c4dc; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; height: 100vh; }
    #header { height: 70px; background: var(--surface); border-bottom: 2px solid var(--primary); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 10; position: relative; }
    .logo-text h1 { font-family: 'Bebas Neue'; font-size: 1.6rem; color: var(--accent); letter-spacing: 2px; }
    #status-bar { text-align: right; display: flex; align-items: center; gap: 20px; }
    #content-wrap { height: calc(100vh - 70px); width: 100%; display: flex; justify-content: center; background: #fff; overflow: hidden; }
    #pdf-img { height: 100%; width: auto; display: block; image-rendering: -webkit-optimize-contrast; }
    #loading { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.5s; }
    .spinner { width: 50px; height: 50px; border: 5px solid #3a4257; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>

<div id="header">
  <div class="logo-text">
    <h1>Tennis Andorf Live</h1>
    <span id="subtitle" style="font-size: 0.75rem; color: var(--accent);">Initialisiere HQ-Ansicht...</span>
  </div>
  <div id="status-bar">
    <div style="font-size: 0.7rem; opacity: 0.8;">Wechsel in: <span id="timer">60</span>s</div>
    <div id="clock" style="font-weight: bold; font-size: 1.2rem;">--:--</div>
  </div>
</div>

<div id="content-wrap">
  <img id="pdf-img" src="" alt="Spielbericht">
</div>

<div id="loading">
  <div class="spinner"></div>
  <p style="margin-top:20px;">Lade hochauflösenden Spielbericht...</p>
</div>

<script>
// ═══════════════════════════════════════════════
const PDF_LISTE = [
  { datum: "2026-05-08", url: "https://oetv-austria.liga.nu/cgi-bin/WebObjects/nuLigaDokumentTENAT.woa/wa/nuDokument?dokument=MeetingReportFOP&meeting=1866397&etag=7d2f969c-5eae-4c42-a487-2d2da6cc1a78" },
  { datum: "2026-05-08", url: "https://oetv-austria.liga.nu/cgi-bin/WebObjects/nuLigaDokumentTENAT.woa/wa/nuDokument?dokument=MeetingReportFOP&meeting=1861376&etag=299da4e5-dab8-47ab-ba2d-4c9581bc3d2f" }
];
const RELOAD_EVERY = 60;
// ═══════════════════════════════════════════════

let timeLeft = RELOAD_EVERY;
let currentIndex = 0;

function refresh() {
  const today = new Date().toISOString().split('T')[0];
  const list = PDF_LISTE.filter(p => p.datum === today);

  if (list.length === 0) {
    document.getElementById('subtitle').textContent = "Keine Spiele heute";
    document.getElementById('loading').classList.add('hidden');
    return;
  }

  if (currentIndex >= list.length) currentIndex = 0;
  const target = list[currentIndex];

  // Methode: thum.io (Spezialisierter HD-Dienst)
  // Wir erzwingen eine Breite von 2000px und warten 2 Sek, bis das PDF geladen ist.
  const hqUrl = "https://image.thum.io/get/width/2000/crop/800/pdf/noanimate/wait/2/" + target.url + "?t=" + Date.now();

  const tempImg = new Image();
  tempImg.src = hqUrl;

  tempImg.onload = () => {
    document.getElementById('pdf-img').src = tempImg.src;
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('subtitle').textContent = `Bericht ${currentIndex + 1} von ${list.length}`;
    currentIndex++;
  };

  tempImg.onerror = () => {
    // Zweitversuch mit Google, falls thum.io hakt
    document.getElementById('pdf-img').src = "https://docs.google.com/viewer?url=" + encodeURIComponent(target.url) + "&embedded=true&a=bi&pagenumber=1&w=1500";
    document.getElementById('loading').classList.add('hidden');
  };

  timeLeft = RELOAD_EVERY;
}

setInterval(() => {
  timeLeft--;
  document.getElementById('timer').textContent = timeLeft;
  if (timeLeft <= 0) refresh();
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('de-AT', {hour:'2-digit', minute:'2-digit'});
}, 1000);

refresh();
</script>
</body>
</html>
