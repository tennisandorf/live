
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TV McDonald's Andorf – Live Ergebnisse</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green:   #1a7a3c;
      --green2:  #23a354;
      --yellow:  #f5c800;
      --dark:    #0d1a12;
      --dark2:   #152010;
      --surface: #1b2d1f;
      --card:    #213028;
      --border:  #2e4835;
      --text:    #e8f0ea;
      --muted:   #7a9e82;
      --win:     #23a354;
      --lose:    #c0392b;
      --live:    #f5c800;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
    }

    /* ── Noise overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    .wrapper { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 0 16px 60px; }

    /* ── Header ── */
    header {
      display: flex; align-items: center; gap: 20px;
      padding: 28px 0 24px;
      border-bottom: 2px solid var(--border);
      margin-bottom: 32px;
    }
    .logo-ball {
      width: 52px; height: 52px;
      background: var(--yellow);
      border-radius: 50%;
      display: grid; place-items: center;
      font-size: 26px;
      flex-shrink: 0;
      box-shadow: 0 0 24px rgba(245,200,0,.35);
    }
    .logo-ball svg { width: 32px; height: 32px; }
    header h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 800;
      line-height: 1;
      color: #fff;
      letter-spacing: .02em;
    }
    header h1 span { color: var(--yellow); }
    .header-right { margin-left: auto; text-align: right; }
    .refresh-badge {
      font-size: .72rem;
      color: var(--muted);
      font-family: 'Barlow Condensed', sans-serif;
      letter-spacing: .05em;
      text-transform: uppercase;
    }
    #last-refresh { color: var(--yellow); font-weight: 600; }

    /* ── Status bar ── */
    #status-bar {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 24px;
      font-size: .8rem;
      color: var(--muted);
      font-family: 'Barlow Condensed', sans-serif;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--muted);
    }
    .dot.live { background: var(--live); box-shadow: 0 0 8px var(--live); animation: pulse 1.4s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── Match card ── */
    .match-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 20px;
      overflow: hidden;
      transition: box-shadow .2s;
    }
    .match-card:hover { box-shadow: 0 4px 24px rgba(0,0,0,.4); }

    /* Card Header */
    .card-header {
      padding: 16px 20px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .bewerb-tag {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--yellow);
      background: rgba(245,200,0,.1);
      border: 1px solid rgba(245,200,0,.25);
      border-radius: 4px;
      padding: 2px 8px;
    }
    .runde-info {
      font-size: .8rem;
      color: var(--muted);
      font-family: 'Barlow Condensed', sans-serif;
      letter-spacing: .04em;
    }
    .status-pill {
      margin-left: auto;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      border-radius: 20px;
      padding: 3px 12px;
    }
    .status-pill.upcoming { background: rgba(122,158,130,.15); color: var(--muted); border: 1px solid var(--border); }
    .status-pill.live     { background: rgba(245,200,0,.15); color: var(--live); border: 1px solid rgba(245,200,0,.3); animation: pulse 1.4s infinite; }
    .status-pill.finished { background: rgba(35,163,84,.15); color: var(--win); border: 1px solid rgba(35,163,84,.3); }
    .status-pill.error    { background: rgba(192,57,43,.15); color: #e74c3c; border: 1px solid rgba(192,57,43,.3); }

    /* Scoreboard */
    .scoreboard {
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 12px;
      align-items: center;
    }
    .team { display: flex; flex-direction: column; }
    .team.home { text-align: left; }
    .team.away { text-align: right; align-items: flex-end; }
    .team-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(1rem, 3vw, 1.3rem);
      font-weight: 700;
      line-height: 1.1;
      color: #fff;
    }
    .team-name.andorf { color: var(--yellow); }
    .date-info {
      font-size: .75rem;
      color: var(--muted);
      margin-top: 4px;
      font-family: 'Barlow Condensed', sans-serif;
      letter-spacing: .03em;
    }
    .score-block { text-align: center; }
    .score-main {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(2rem, 7vw, 3.2rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: .02em;
    }
    .score-main.decided { color: #fff; }
    .score-main.pending { color: var(--muted); }
    .score-sep { color: var(--border); margin: 0 4px; }
    .upcoming-time {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      color: var(--muted);
      letter-spacing: .06em;
    }

    /* Singles / Doubles section */
    .section-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 8px 20px;
      background: var(--dark2);
      border-top: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead tr {
      background: rgba(0,0,0,.2);
    }
    thead th {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 6px 20px;
      text-align: left;
    }
    thead th.center { text-align: center; }

    tbody tr {
      border-top: 1px solid var(--border);
      transition: background .15s;
    }
    tbody tr:hover { background: rgba(255,255,255,.03); }

    td {
      padding: 10px 20px;
      font-size: .88rem;
      vertical-align: middle;
    }
    .player-cell { font-weight: 600; }
    .itn-badge {
      display: inline-block;
      font-size: .65rem;
      background: rgba(122,158,130,.15);
      color: var(--muted);
      border-radius: 3px;
      padding: 1px 5px;
      margin-left: 6px;
      font-family: 'Barlow Condensed', sans-serif;
      letter-spacing: .03em;
      vertical-align: middle;
    }
    .sets-cell { text-align: center; font-family: 'Barlow Condensed', sans-serif; font-size: .9rem; }
    .set { display: inline-block; min-width: 36px; text-align: center; }
    .set.winner { font-weight: 700; color: #fff; }
    .set.loser  { color: var(--muted); }
    .result-dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
    }
    .result-dot.win  { background: var(--win); box-shadow: 0 0 6px var(--win); }
    .result-dot.lose { background: var(--lose); }

    /* No data yet */
    .empty-note {
      padding: 24px 20px;
      text-align: center;
      color: var(--muted);
      font-size: .85rem;
      font-family: 'Barlow Condensed', sans-serif;
      letter-spacing: .05em;
    }

    /* Skeleton loader */
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--card) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
      height: 18px;
      margin: 4px 0;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    .error-msg {
      padding: 20px;
      color: #e74c3c;
      font-size: .85rem;
      background: rgba(192,57,43,.08);
      border-top: 1px solid rgba(192,57,43,.2);
    }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: .72rem;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-family: 'Barlow Condensed', sans-serif;
      letter-spacing: .06em;
    }
    footer a { color: var(--muted); }
  </style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="logo-ball">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="16" cy="16" r="14" fill="#0d1a12"/>
        <path d="M4 14 Q10 9 16 14 Q22 19 28 14" stroke="#1a7a3c" stroke-width="2.2" fill="none"/>
        <path d="M4 18 Q10 23 16 18 Q22 13 28 18" stroke="#1a7a3c" stroke-width="2.2" fill="none"/>
        <circle cx="16" cy="16" r="14" stroke="#f5c800" stroke-width="1.5" fill="none"/>
      </svg>
    </div>
    <div>
      <h1>TV <span>McDonald's</span> Andorf</h1>
      <div style="font-size:.8rem;color:var(--muted);margin-top:2px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.04em;">LIVE ERGEBNISSE</div>
    </div>
    <div class="header-right">
      <div class="refresh-badge">Aktualisiert <span id="last-refresh">–</span></div>
      <div class="refresh-badge" style="margin-top:4px;">Nächste Abfrage in <span id="countdown">60s</span></div>
    </div>
  </header>

  <div id="status-bar">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">Lade Daten …</span>
  </div>

  <div id="matches-container">
    <!-- Skeleton -->
    <div class="match-card">
      <div class="card-header"><div class="skeleton" style="width:120px"></div></div>
      <div style="padding:20px"><div class="skeleton" style="width:80%"></div><div class="skeleton" style="width:50%;margin-top:8px"></div></div>
    </div>
  </div>

  <footer>
    Datenquelle: <a href="https://oetv-austria.liga.nu" target="_blank">ÖTV Austria Liga</a>
    &nbsp;·&nbsp;
    TV McDonald's Andorf &nbsp;·&nbsp;
    <span id="footer-time"></span>
  </footer>
</div>

<script>
const RESULTS_URL = 'results.json';
const REFRESH_MS  = 60_000; // 60 Sekunden

let countdown = 60;
let timer;

// ── Hilfsfunktionen ───────────────────────────────────────────────────────────

function fmt(iso) {
  if (!iso) return '–';
  const d = new Date(iso);
  return d.toLocaleTimeString('de-AT', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function statusLabel(s) {
  const map = { upcoming: 'Ausstehend', live: 'Läuft', finished: 'Beendet', error: 'Fehler' };
  return map[s] || s;
}

// ── Render-Funktionen ─────────────────────────────────────────────────────────

function renderSet(val, isWinner) {
  if (!val || val === '0:0') return `<span class="set" style="color:var(--border)">–</span>`;
  return `<span class="set ${isWinner ? 'winner' : 'loser'}">${val}</span>`;
}

function renderSingles(singles, heimName) {
  if (!singles || singles.length === 0) {
    return `<div class="empty-note">Noch keine Einzel-Ergebnisse</div>`;
  }
  const rows = singles.map(s => {
    const hw = s.winner === 'heim';
    return `
      <tr>
        <td style="width:28px;color:var(--muted);font-family:'Barlow Condensed',sans-serif">${s.nr}</td>
        <td class="player-cell">
          ${s.heim}<span class="itn-badge">ITN ${s.heim_itn}</span>
          ${hw ? '<span class="result-dot win" style="margin-left:6px"></span>' : ''}
        </td>
        <td class="player-cell">
          ${s.gast}<span class="itn-badge">ITN ${s.gast_itn}</span>
          ${!hw ? '<span class="result-dot win" style="margin-left:6px"></span>' : ''}
        </td>
        <td class="sets-cell">${renderSet(s.satz1, hw)} ${renderSet(s.satz2, hw)} ${renderSet(s.satz3, hw)}</td>
      </tr>`;
  }).join('');
  return `
    <table>
      <thead><tr>
        <th>#</th><th>Heim</th><th>Gast</th><th class="center">Sätze</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function renderDoubles(doubles) {
  if (!doubles || doubles.length === 0) {
    return `<div class="empty-note">Noch keine Doppel-Ergebnisse</div>`;
  }
  const rows = doubles.map((d, i) => {
    const hw = d.winner === 'heim';
    return `
      <tr>
        <td style="width:28px;color:var(--muted);font-family:'Barlow Condensed',sans-serif">${i+1}</td>
        <td>${hw ? '<span class="result-dot win"></span>' : '<span class="result-dot lose"></span>'}</td>
        <td class="sets-cell">${renderSet(d.satz1, hw)} ${renderSet(d.satz2, hw)} ${renderSet(d.satz3, hw)}</td>
      </tr>`;
  }).join('');
  return `
    <table>
      <thead><tr><th>#</th><th>Ergebnis</th><th class="center">Sätze</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function renderMatch(m) {
  const h = m.header || {};
  const isAndorf = name => name && name.toLowerCase().includes('andorf');

  // Score
  let scoreHtml;
  if (m.status === 'finished' || m.status === 'live') {
    const hScore = h.ergebnis_heim ?? '–';
    const gScore = h.ergebnis_gast ?? '–';
    scoreHtml = `<span class="score-main decided">
      <span>${hScore}</span>
      <span class="score-sep">:</span>
      <span>${gScore}</span>
    </span>`;
  } else {
    scoreHtml = `<div class="upcoming-time">${h.datum || ''} ${h.uhrzeit || ''}</div>`;
  }

  return `
    <div class="match-card">
      <div class="card-header">
        <span class="bewerb-tag">${h.bewerb || 'Tennis'}</span>
        <span class="runde-info">${h.runde || ''} &nbsp;·&nbsp; ${h.datum || ''} ${h.uhrzeit || ''}</span>
        <span class="status-pill ${m.status}">${statusLabel(m.status)}</span>
      </div>

      <div class="scoreboard">
        <div class="team home">
          <div class="team-name ${isAndorf(h.heim) ? 'andorf' : ''}">${h.heim || m.label.split(' vs ')[0]}</div>
        </div>
        <div class="score-block">${scoreHtml}</div>
        <div class="team away">
          <div class="team-name ${isAndorf(h.gast) ? 'andorf' : ''}">${h.gast || m.label.split(' vs ')[1] || ''}</div>
        </div>
      </div>

      ${m.status === 'error' ? `<div class="error-msg">⚠ Fehler beim Laden: ${m.error || 'Unbekannt'}</div>` : ''}

      ${m.singles && m.singles.length ? `
        <div class="section-title">Einzel</div>
        ${renderSingles(m.singles, h.heim)}
      ` : ''}

      ${m.doubles && m.doubles.length ? `
        <div class="section-title">Doppel</div>
        ${renderDoubles(m.doubles)}
      ` : ''}
    </div>`;
}

// ── Daten laden ───────────────────────────────────────────────────────────────

async function loadData() {
  const dot  = document.getElementById('status-dot');
  const txt  = document.getElementById('status-text');
  dot.className = 'dot live';
  txt.textContent = 'Lade …';

  try {
    const res = await fetch(RESULTS_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    const container = document.getElementById('matches-container');
    container.innerHTML = data.matches.map(renderMatch).join('');

    document.getElementById('last-refresh').textContent = fmt(data.generated_at);
    document.getElementById('footer-time').textContent = `Stand: ${fmt(data.generated_at)}`;

    const anyLive = data.matches.some(m => m.status === 'live');
    dot.className = anyLive ? 'dot live' : 'dot';
    txt.textContent = anyLive
      ? `${data.matches.filter(m=>m.status==='live').length} Spiel(e) live`
      : `${data.matches.length} Begegnung(en) geladen`;
  } catch (e) {
    document.getElementById('status-text').textContent = 'Fehler beim Laden – nächster Versuch in 60s';
    dot.className = 'dot';
  }
}

// ── Countdown & Auto-Refresh ──────────────────────────────────────────────────

function startCountdown() {
  countdown = 60;
  clearInterval(timer);
  timer = setInterval(() => {
    countdown--;
    document.getElementById('countdown').textContent = countdown + 's';
    if (countdown <= 0) {
      clearInterval(timer);
      loadData().then(startCountdown);
    }
  }, 1000);
}

// Start
loadData().then(startCountdown);
</script>
</body>
</html>
